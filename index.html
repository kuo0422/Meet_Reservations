<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>訂位申請 - 遇見露營區</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/themes/base/jquery-ui.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

    <style>
        body {
            background: #f4f1ec;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }

        .page-title {
            color: #654b24;
            font-weight: bold;
            text-align: center;
            padding: 20px 0 10px;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }

        .card-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            font-size: 1rem;
            font-weight: bold;
            color: #654b24;
            border-left: 4px solid #654b24;
            padding-left: 10px;
            margin-bottom: 14px;
        }

        /* ── 月曆 ── */
        #datepicker {
            width: 100%;
        }

        .ui-datepicker {
            width: 100% !important;
            font-size: 1rem;
        }

        .ui-datepicker-calendar td {
            text-align: center;
            width: 14%;
            position: relative;
            vertical-align: top;
        }

        .ui-datepicker td a,
        .ui-datepicker td span {
            text-align: center;
            padding: .4em .2em;
            display: block;
            position: relative;
        }

        .ui-state-default {
            background: #f8f7f6;
            border-color: #ccc;
            color: #333;
        }

        .ui-state-highlight,
        .ui-widget-content .ui-state-highlight {
            background: #fdf6ec;
            border-color: #654b24;
            color: #654b24;
        }

        /* 已選擇的日期 */
        .ui-datepicker td.selected-date a {
            background: #654b24 !important;
            border-color: #654b24 !important;
            color: #fff !important;
            font-weight: bold;
        }

        /* 剩餘位置顯示 */
        .availability-badge {
            display: block;
            text-align: center;
            margin: 2px auto 3px;
            font-size: 0.6rem;
            background: #28a745;
            color: white;
            border-radius: 8px;
            padding: 1px 5px;
            font-weight: bold;
            pointer-events: none;
            white-space: nowrap;
            line-height: 1.5;
        }

        .availability-badge.low {
            background: #e07b00;
            color: #fff;
        }

        .availability-badge.full {
            background: #dc3545;
        }

        /* 更新剩餘數量按鈕 */
        .reload-avail-btn {
            background: none;
            border: 1px solid #654b24;
            color: #654b24;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .reload-avail-btn:hover:not(:disabled) {
            background: #fdf6ec;
        }

        .reload-avail-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .reload-avail-btn.spinning {
            animation: spin 0.8s linear infinite;
        }

        /* 日期範圍（中間日期） */
        .ui-datepicker td.range-date>a,
        .ui-datepicker td.range-date>span {
            background: #e8d5bf !important;
            border-color: #c9a87a !important;
            color: #654b24 !important;
        }

        /* 中間日期的剩餘數量徽章強制保持原色 */
        .ui-datepicker td.range-date .availability-badge {
            background: #28a745 !important;
            color: #fff !important;
        }
        .ui-datepicker td.range-date .availability-badge.low {
            background: #e07b00 !important;
        }
        .ui-datepicker td.range-date .availability-badge.full {
            background: #dc3545 !important;
        }

        /* Hover 預覽範圍 */
        .ui-datepicker td.hover-range-preview>a,
        .ui-datepicker td.hover-range-preview>span {
            background: #f5ece0 !important;
            border-color: #d9bb96 !important;
            color: #654b24 !important;
        }

        /* 範圍選取狀態提示 */
        #rangeStatus {
            text-align: center;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fdf6ec;
            color: #654b24;
            border: 1px dashed #654b24;
            display: none;
        }

        /* 已選日期橫幅 */
        .date-selected-banner {
            background: #654b24;
            color: #fff;
            border-radius: 8px;
            padding: 10px 16px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: bold;
            margin-top: 12px;
            display: none;
        }

        /* ── 區域列 ── */
        .area-row {
            border: 2px solid #e0dada;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
        }

        .area-row.selected {
            border-color: #654b24;
            background: #fdf6ec;
        }

        .area-checkbox,
        .area-group-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .area-label {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0;
            cursor: pointer;
        }

        .rain-badge {
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: normal;
            margin-left: 6px;
            vertical-align: middle;
        }

        .rain-yes {
            background: #d1ecf1;
            color: #0c5460;
        }

        .rain-no {
            background: #e2e3e5;
            color: #383d41;
        }

        .people-input-row {
            display: none;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }

        .people-input-row input[type="number"] {
            width: 88px;
            display: inline-block;
        }

        /* ── 子區域選項 ── */
        .zone-options-row {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }

        .zone-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            padding: 7px 2px;
            cursor: pointer;
        }

        .zone-item + .zone-item {
            border-top: 1px solid #f5f5f5;
        }

        .zone-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .zone-label {
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            min-width: 52px;
            margin-bottom: 0;
        }

        .people-input-inline {
            display: none;
            align-items: center;
        }

        /* ── 車數顯示 ── */
        .car-count-row {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 1rem;
        }

        .car-count-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #654b24;
        }

        /* ── 送出按鈕 ── */
        .btn-submit {
            background-color: #654b24;
            border-color: #654b24;
            font-size: 1.15rem;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: #4e3a1c;
            border-color: #4e3a1c;
        }

        .btn-submit:disabled {
            opacity: 0.7;
        }

        /* ── 手機版調整 ── */
        @media (max-width: 480px) {
            .page-title {
                font-size: 1.7rem;
            }

            .area-label {
                font-size: 1.4rem;
            }

            .section-title {
                font-size: 1.3rem;
            }

            .form-control {
                font-size: 1.3rem;
                height: auto;
                padding: 10px 12px;
            }

            label {
                font-size: 1.25rem;
            }

            .btn-submit {
                font-size: 1.4rem;
                padding: 14px;
            }

            .car-count-value {
                font-size: 1.6rem;
            }

            .rain-badge {
                font-size: 0.95rem;
            }

            .card-section {
                padding: 14px 10px;
            }

            .container {
                padding-left: 6px !important;
                padding-right: 6px !important;
            }

            small {
                font-size: 1rem;
            }
        }

        /* ── 平板版調整（481px ~ 900px） ── */
        @media (min-width: 481px) and (max-width: 900px) {
            .page-title {
                font-size: 1.8rem;
            }

            .area-label {
                font-size: 1.45rem;
            }

            .section-title {
                font-size: 1.35rem;
            }

            .form-control {
                font-size: 1.35rem;
                height: auto;
                padding: 10px 14px;
            }

            label {
                font-size: 1.3rem;
            }

            .btn-submit {
                font-size: 1.45rem;
                padding: 14px;
            }

            .car-count-value {
                font-size: 1.65rem;
            }

            .rain-badge {
                font-size: 1rem;
            }

            .card-section {
                padding: 16px 12px;
            }

            .container {
                padding-left: 8px !important;
                padding-right: 8px !important;
            }

            small {
                font-size: 1.05rem;
            }

            .container {
                max-width: 880px;
            }
        }


        /* ── Loading 遮罩 ── */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(244, 241, 236, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loadingOverlay .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #e0d8ce;
            border-top-color: #654b24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #loadingOverlay .loading-text {
            color: #654b24;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading 遮罩 -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">載入中…</div>
    </div>

    <div class="container py-2">

        <div class="page-title">📅 訂位申請</div>

        <!-- ══ 1. 訂位日期（支援多選連續日期） ═══════════════════════ -->
        <div class="card-section">
            <div class="section-title d-flex justify-content-between align-items-center">
                <span>① 選擇訂位日期</span>
                <button type="button" id="reloadAvailBtn" class="reload-avail-btn" title="更新剩餘數量">↻</button>
            </div>
            <div id="datepicker"></div>
            <div id="rangeStatus"></div>
            <div class="date-selected-banner" id="dateBanner">
                已選擇：<span id="selectedDateText"></span>
            </div>
        </div>

        <!-- ══ 2 ~ 5（選完日期後顯示）══════════════════════════════ -->
        <div id="formSection" style="display:none;">

            <!-- ── 2. 聯絡資訊 ─────────────────────────────────────── -->
            <div class="card-section">
                <div class="section-title">② 聯絡資訊</div>

                <div class="form-group">
                    <label for="inputName">姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="inputName" placeholder="請輸入姓名" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="inputPhone">電話 <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="inputPhone" placeholder="09XXXXXXXX" maxlength="10"
                        autocomplete="tel">
                </div>

                <div class="form-group mb-0">
                    <label for="inputCarPlate">
                        車號 <small class="text-muted font-weight-normal">（選填）</small>
                    </label>
                    <input type="text" class="form-control" id="inputCarPlate" placeholder="例：ABC-1234">
                </div>
            </div>

            <!-- ── 3. 區域與人數 ────────────────────────────────────── -->
            <div class="card-section">
                <div class="section-title">③ 選擇區域與人數 <span class="text-danger">*</span></div>

                <div id="areasContainer">
                    <div class="text-center text-muted py-3">
                        <span class="spinner-border spinner-border-sm mr-2"></span>載入中...
                    </div>
                </div>

                <div class="car-count-row d-flex align-items-center">
                    <span class="mr-2">車數：</span>
                    <span class="car-count-value" id="carCountDisplay">0 車</span>
                    <small class="text-muted ml-2">（依勾選區域數自動計算）</small>
                </div>
            </div>

            <!-- ── 4. 備註 ──────────────────────────────────────────── -->
            <div class="card-section">
                <div class="section-title">④ 備註 <small class="text-muted font-weight-normal">（選填）</small></div>
                <textarea class="form-control" id="inputNotes" rows="3" placeholder="其他需求或備註"></textarea>
            </div>

            <!-- ── 錯誤訊息 ─────────────────────────────────────────── -->
            <div class="alert alert-danger" id="errorMsg" style="display:none; border-radius:8px;"></div>

            <!-- ── 送出按鈕 ─────────────────────────────────────────── -->
            <button type="button" class="btn btn-primary btn-submit" id="submitBtn">
                確認送出訂位
            </button>

            <div id="output" class="mt-3"></div>

        </div><!-- /formSection -->

    </div><!-- /container -->


    <script>
        // ════════════════════════════════════════════════════════════
        // 配置區域
        // ════════════════════════════════════════════════════════════
        const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzvKVk1mOxQ71bpUxC1az9N1GusTRSk90EoYs2M6CesizabaxuBJiSKDJMjgUP7ynr6/exec';
        const LIFF_ID = '2009523479-cbGjkaQk';

        // ── 全域變數 ───────────────────────────────────────────────
        var areasData = [];
        var selectedDates = []; // 已選擇的日期陣列（字串格式：yyyy/MM/dd）
        var rangeStart = null;   // 第一次點擊的起始日期（字串），null 表示尚未選取
        var monthAvailability = {}; // 剩餘位置資料（含預載的 3 個月）
        var isRefreshing = false;   // 防止 datepicker refresh 觸發 onSelect
        var initYear = 0;           // 起始年（供 reload 按鈕使用）
        var initMonth = 0;          // 起始月（供 reload 按鈕使用）
        var LINE_USER_ID = "";
        var LINE_ID_TOKEN = "";
        var LINE_DISPLAY_NAME = "";

        // ════════════════════════════════════════════════════════════
        // LIFF 初始化與頁面啟動
        // ════════════════════════════════════════════════════════════

        // ── 判斷 JWT idToken 是否過期 ────────────────────────────
        function isTokenExpired(token) {
            if (!token) return true;
            try {
                var payload = JSON.parse(atob(token.split('.')[1]));
                // exp 為秒，Date.now() 為毫秒
                return payload.exp * 1000 < Date.now();
            } catch (e) {
                return true;
            }
        }

        // liff.init({ liffId: LIFF_ID })
        //     .then(function () {

        //         if (!liff.isLoggedIn()) {
        //             //sessionStorage.setItem('liff_refreshed', '1');
        //             liff.login();
        //             return new Promise(() => {}); // 永不 resolve，阻止後續 .then 執行
        //         }

        //         // 第一次進來（沒有 flag）→ 登出再登入，強制新 session
        //         // if (!sessionStorage.getItem('liff_refreshed')) {
        //         //     sessionStorage.setItem('liff_refreshed', '1');
        //         //     liff.logout();
        //         //     liff.login(); // 觸發跳轉，回來後 session 是新的
        //         //     return new Promise(() => {}); // 永不 resolve，阻止後續 .then 執行
        //         // }

        //         return liff.getProfile();
        //     })
        //     .then(function (profile) {
        //         if (profile) {
        //             LINE_USER_ID = profile.userId;
        //             LINE_ID_TOKEN = liff.getIDToken();
        //             LINE_DISPLAY_NAME = profile.displayName || "";

        //             // 若 idToken 已過期，登出並重新登入以取得新 token
        //             if (isTokenExpired(LINE_ID_TOKEN)) {
        //                 liff.logout();
        //                 liff.login();
        //                 return new Promise(() => {}); // 永不 resolve，阻止後續 .then 執行
        //             }
        //         }
        //         initPage();
        //     })
        //     .catch(function (error) {
        //         console.error('LIFF init error:', error);
        //         initPage();
        //     });

        initPage();

        // ════════════════════════════════════════════════════════════
        // 頁面初始化
        // ════════════════════════════════════════════════════════════
        function initPage() {
            $("#loadingOverlay").fadeOut(300);

            // 帶入 LINE 使用者名稱
            if (LINE_DISPLAY_NAME) {
                $("#inputName").val(LINE_DISPLAY_NAME);
            }

            // 初始化日期選擇器（多選模式）
            initDatepicker();

            // 載入區域配置
            loadAreasConfig();

            // 更新剩餘數量按鈕
            $("#reloadAvailBtn").on("click", function () {
                loadAvailability();
            });
        }

        // ── 初始化日期選擇器（支援多選連續日期） ───────────────────
        function initDatepicker() {
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            var currentYear = today.getFullYear();
            var currentMonth = today.getMonth() + 1;

            // 儲存起始年月供 reload 按鈕使用，並載入剩餘數量
            initYear = currentYear;
            initMonth = currentMonth;
            loadAvailability();

            $("#datepicker").datepicker({
                dateFormat: "yy/mm/dd",
                minDate: "+1d",
                maxDate: "+3M",
                dayNamesMin: ["日", "一", "二", "三", "四", "五", "六"],
                monthNames: ["1月", "2月", "3月", "4月", "5月", "6月",
                    "7月", "8月", "9月", "10月", "11月", "12月"],
                monthNamesShort: ["1月", "2月", "3月", "4月", "5月", "6月",
                    "7月", "8月", "9月", "10月", "11月", "12月"],

                // 自定義日期顯示（加上剩餘位置標記）
                beforeShowDay: function (date) {
                    var dateStr = formatDate(date);
                    var key = dateStr.replace(/\//g, '-');

                    // 計算 CSS 樣式
                    var cssClass = '';
                    var idx = selectedDates.indexOf(dateStr);
                    if (idx !== -1) {
                        // 端點（起始 / 結束）顯示深色，中間顯示淡色
                        if (selectedDates.length === 1 || idx === 0 || idx === selectedDates.length - 1) {
                            cssClass = 'selected-date';
                        } else {
                            cssClass = 'range-date';
                        }
                    }

                    // 取得剩餘位置
                    var dayData = monthAvailability[key];
                    var available = (dayData !== undefined) ? dayData.remain : undefined;
                    var tooltip = '';

                    if (available !== undefined) {
                        if (available > 0) {
                            tooltip = '剩餘 ' + available + ' 個位置';
                        } else {
                            tooltip = '已額滿';
                            cssClass += ' ui-state-disabled';
                        }
                    }

                    return [available !== 0, cssClass, tooltip];
                },

                // 點擊日期時切換選擇狀態
                onSelect: function (dateText, inst) {
                    if (isRefreshing) return;
                    if (!dateText || !/^\d{4}\/\d{2}\/\d{2}$/.test(dateText)) return;
                    toggleDateSelection(dateText);
                },

                // 切換月份時重繪徽章（不呼叫 API，資料已預載）
                onChangeMonthYear: function (year, month, inst) {
                    setTimeout(function () {
                        updateCalendarSelection();
                        renderAvailabilityBadges();
                    }, 0);
                }
            });

            // ── Hover 預覽範圍（事件委派，refresh 後依然有效）──
            $("#datepicker").on("mouseenter", ".ui-datepicker-calendar td", function () {
                if (!rangeStart) return;
                var dateStr = getDateFromTd(this);
                if (!dateStr) return;
                highlightHoverRange(dateStr);
            }).on("mouseleave", ".ui-datepicker-calendar", function () {
                clearHoverHighlight();
            });
        }

        // ── 載入全部剩餘位置資料（單次 API，後端依 config 决定涵蓋月份）────
        function loadAvailability() {
            var $btn = $("#reloadAvailBtn");
            $btn.prop("disabled", true).addClass("spinning");

            fetch(API_BASE_URL + '?action=getAvailability')
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    monthAvailability = data;
                    isRefreshing = true;
                    $("#datepicker").datepicker("refresh");
                    isRefreshing = false;
                    updateCalendarSelection();
                    renderAvailabilityBadges();
                    filterAreasBySelectedDates();
                    $btn.prop("disabled", false).removeClass("spinning");
                })
                .catch(function (error) {
                    console.error('Failed to load availability:', error);
                    $btn.prop("disabled", false).removeClass("spinning");
                });
        }

        // ── 在月曆日期格上顯示剩餘位置徽章 ─────────────────────
        function renderAvailabilityBadges() {
            var monthNames = ["1月", "2月", "3月", "4月", "5月", "6月",
                "7月", "8月", "9月", "10月", "11月", "12月"];
            var yearText = $("#datepicker .ui-datepicker-year").text().trim();
            var monthText = $("#datepicker .ui-datepicker-month").text().trim();
            var year = parseInt(yearText, 10);
            var month = monthNames.indexOf(monthText);
            if (isNaN(year) || month === -1) return;

            var today = new Date();
            today.setHours(0, 0, 0, 0);

            $("#datepicker .ui-datepicker-calendar td").each(function () {
                var $td = $(this);
                var $link = $td.find("a, span").first();
                if ($link.length === 0) return;

                // 移除舊徽章（徽章在 $td 上）
                $td.find(".availability-badge").remove();

                // 只讀 a 元素的直接文字節點，不被子元素影響
                var dayText = '';
                $link.contents().each(function () {
                    if (this.nodeType === 3) dayText += this.nodeValue;
                });
                var day = parseInt(dayText.trim(), 10);
                if (isNaN(day) || day <= 0) return;

                // 只顯示今天之後的日期
                var dateObj = new Date(year, month, day);
                if (dateObj <= today) return;

                var dateStr = formatDate(new Date(year, month, day));
                var key = dateStr.replace(/\//g, '-');
                var dayData = monthAvailability[key];
                var available = (dayData !== undefined) ? dayData.remain : undefined;
                if (available === undefined) return;

                var badgeClass = "availability-badge";
                var badgeText;
                if (available <= 0) {
                    badgeClass += " full";
                    badgeText = "滿";
                } else if (available <= 3) {
                    badgeClass += " low";
                    badgeText = available;
                } else {
                    badgeText = available;
                }

                // 徽章掛在 $td 上，不放入 <a> 避免 jQuery UI 讀到徽章數字
                $td.append('<span class="' + badgeClass + '">' + badgeText + '</span>');
            });
        }

        // ── 直接更新月曆 TD 的選取樣式（不觸發 datepicker refresh）────
        function updateCalendarSelection() {
            var monthNames = ["1月", "2月", "3月", "4月", "5月", "6月",
                "7月", "8月", "9月", "10月", "11月", "12月"];
            var yearText = $("#datepicker .ui-datepicker-year").text().trim();
            var monthText = $("#datepicker .ui-datepicker-month").text().trim();
            var year = parseInt(yearText, 10);
            var month = monthNames.indexOf(monthText);
            if (isNaN(year) || month === -1) return;

            $("#datepicker .ui-datepicker-calendar td").each(function () {
                var $td = $(this);
                $td.removeClass('selected-date range-date');

                var $link = $td.find("a, span").first();
                if (!$link.length) return;

                // 只讀直接文字節點，避免把徽章數字混入
                var dayText = '';
                $link.contents().each(function () {
                    if (this.nodeType === 3) dayText += this.nodeValue;
                });
                var day = parseInt(dayText.trim(), 10);
                if (isNaN(day) || day <= 0) return;

                var dateStr = formatDate(new Date(year, month, day));
                var idx = selectedDates.indexOf(dateStr);
                if (idx === -1) return;

                if (selectedDates.length === 1 || idx === 0 || idx === selectedDates.length - 1) {
                    $td.addClass('selected-date');
                } else {
                    $td.addClass('range-date');
                }
            });
        }

        // ── 清空區域選擇（日期重選時使用）─────────────────────────
        function clearAreaSelections() {
            $(".area-checkbox, .zone-checkbox, .area-group-checkbox").prop("checked", false);
            $(".area-row, .area-group-row").removeClass("selected");
            $(".people-input-row").hide();
            $(".people-input-inline").hide();
            $(".zone-options-row").hide();
            $("input[id^='ppl-']").val("");
            updateCarCount();
        }

        // ── 切換日期選擇狀態（範圍選取：第1次點擊=起始，第2次點擊=結束）──
        function toggleDateSelection(dateText) {
            if (rangeStart === null) {
                // 若已有選取日期，表示重新選擇，先清空區域選擇
                if (selectedDates.length > 0) {
                    clearAreaSelections();
                }
                // 第一次點擊：設為起始日期
                rangeStart = dateText;
                selectedDates = [dateText];
                $("#rangeStatus").text("📅 起始日期：" + dateText + "　　請繼續點選結束日期").show();
            } else if (rangeStart === dateText) {
                // 再次點擊同一天：視為單日訂位，完成選取
                rangeStart = null;
                selectedDates = [dateText];
                $("#rangeStatus").hide();
            } else {
                // 第二次點擊：填滿範圍內所有日期
                var start = new Date(rangeStart.replace(/\//g, '-'));
                var end = new Date(dateText.replace(/\//g, '-'));
                if (end < start) { var tmp = start; start = end; end = tmp; }

                selectedDates = [];
                var cur = new Date(start);
                while (cur <= end) {
                    selectedDates.push(formatDate(cur));
                    cur.setDate(cur.getDate() + 1);
                }
                rangeStart = null;
                $("#rangeStatus").hide();
            }

            selectedDates.sort();
            updateSelectedDatesDisplay();
            filterAreasBySelectedDates();
            // jQuery UI 在 onSelect 結束後仍會做 DOM 後處理，需延後覆寫
            setTimeout(function () {
                updateCalendarSelection();
                renderAvailabilityBadges();
            }, 0);
        }

        // ── 更新已選日期的顯示橫幅 ─────────────────────────────────
        function updateSelectedDatesDisplay() {
            if (selectedDates.length === 0) {
                $("#dateBanner").hide();
                $("#formSection").slideUp(200);
                return;
            }

            var displayText = '';
            if (selectedDates.length === 1) {
                displayText = selectedDates[0];
            } else {
                displayText = selectedDates[0] + ' ~ ' + selectedDates[selectedDates.length - 1] +
                    ' 共 ' + selectedDates.length + ' 天';
            }

            $("#selectedDateText").text(displayText);
            $("#dateBanner").show();
            $("#formSection").slideDown(200);
        }

        // ── 依選取日期過濾可用區域（所有選取日期都未被佔用才能選）──
        function filterAreasBySelectedDates() {
            if (!areasData || areasData.length === 0) return;

            // 收集所有選取日期中已被使用的區域（取聯集）
            var usedSet = {};
            selectedDates.forEach(function (dateStr) {
                var key = dateStr.replace(/\//g, '-');
                var dayData = monthAvailability[key];
                if (dayData && dayData.used) {
                    dayData.used.forEach(function (areaName) {
                        usedSet[areaName] = true;
                    });
                }
            });

            areasData.forEach(function (area) {
                if (!area.item || area.item.length === 0) {
                    // 單一區域：整個 row 依是否被用到顯示/隱藏
                    var blocked = !!usedSet[area.name];
                    var $row = $("#areaRow-" + area.name);
                    if (blocked) {
                        // 取消勾選並隱藏
                        var $chk = $("#chk-" + area.name);
                        if ($chk.is(":checked")) $chk.prop("checked", false).trigger("change");
                        $row.hide();
                    } else {
                        $row.show();
                    }
                } else {
                    // 群組區域：逐一檢查子區域
                    var visibleCount = 0;
                    area.item.forEach(function (item) {
                        var fullName = area.name + '-' + item.name;
                        var blocked = !!usedSet[fullName];
                        var $zoneItem = $("#zoneItem-" + fullName);
                        if (blocked) {
                            var $chk = $("#chk-" + fullName);
                            if ($chk.is(":checked")) $chk.prop("checked", false).trigger("change");
                            $zoneItem.hide();
                        } else {
                            $zoneItem.show();
                            visibleCount++;
                        }
                    });
                    // 若子區域全部被佔用，隱藏整個群組
                    var $groupRow = $("#areaGroupRow-" + area.name);
                    if (visibleCount === 0) {
                        var $chkGroup = $("#chkGroup-" + area.name);
                        if ($chkGroup.is(":checked")) $chkGroup.prop("checked", false).trigger("change");
                        $groupRow.hide();
                    } else {
                        $groupRow.show();
                    }
                }
            });

            updateCarCount();
        }

        // ── 載入區域配置 ───────────────────────────────────────────
        function loadAreasConfig() {
            fetch(API_BASE_URL + '?action=getAreas')
                .then(function (response) { return response.json(); })
                .then(function (areas) {
                    buildAreasUI(areas);
                })
                .catch(function (error) {
                    console.error('Failed to load areas config:', error);
                    $("#areasContainer").html(
                        '<div class="text-danger">區域載入失敗，請重新整理頁面。</div>'
                    );
                });
        }

        // ── 動態建立區域 UI ────────────────────────────────────────
        function buildAreasUI(areas) {
            areasData = areas;
            if (!areas || areas.length === 0) {
                $("#areasContainer").html('<div class="text-muted">目前無可用區域，請聯絡管理員。</div>');
                return;
            }

            var html = "";
            areas.forEach(function (area) {
                var rainBadge = area.hasRain
                    ? '<span class="rain-badge rain-yes">有雨棚</span>'
                    : '<span class="rain-badge rain-no">無雨棚</span>';

                if (!area.item || area.item.length === 0) {
                    // ── 單一區域：原始樣式 ──────────────────────────
                    html +=
                        '<div class="area-row" id="areaRow-' + area.name + '">' +
                        '<div class="d-flex align-items-center">' +
                        '<input type="checkbox" class="area-checkbox mr-3"' +
                        ' id="chk-' + area.name + '"' +
                        ' data-area="' + area.name + '">' +
                        '<label class="area-label mb-0" for="chk-' + area.name + '">' +
                        area.name + rainBadge +
                        '</label>' +
                        '</div>' +
                        '<div class="people-input-row" id="pplRow-' + area.name + '">' +
                        '<div class="d-flex align-items-center">' +
                        '<span class="mr-2 text-muted" style="font-size:.9rem;">人數：</span>' +
                        '<input type="number" class="form-control form-control-sm"' +
                        ' id="ppl-' + area.name + '" min="1" max="99"' +
                        ' placeholder="人數" style="width:90px;">' +
                        '<span class="ml-2">人</span>' +
                        '</div>' +
                        '</div>' +
                        '</div>';
                } else {
                    // ── 多子區：群組可展開樣式 ──────────────────────
                    var groupName = area.name;
                    html +=
                        '<div class="area-row area-group-row" id="areaGroupRow-' + groupName + '"' +
                        ' data-group="' + groupName + '">' +
                        '<div class="d-flex align-items-center">' +
                        '<input type="checkbox" class="area-group-checkbox mr-3"' +
                        ' id="chkGroup-' + groupName + '"' +
                        ' data-group="' + groupName + '">' +
                        '<label class="area-label mb-0" for="chkGroup-' + groupName + '">' +
                        groupName + rainBadge +
                        '</label>' +
                        '</div>' +
                        '<div class="zone-options-row" id="zonesRow-' + groupName + '" style="display:none;">';

                    area.item.forEach(function (item) {
                        var fullName = groupName + '-' + item.name;
                        html +=
                            '<div class="zone-item" id="zoneItem-' + fullName + '">' +
                            '<input type="checkbox" class="area-checkbox zone-checkbox mr-2"' +
                            ' id="chk-' + fullName + '"' +
                            ' data-area="' + fullName + '"' +
                            ' data-group="' + groupName + '">' +
                            '<label class="zone-label mr-3" for="chk-' + fullName + '">' +
                            item.name + '</label>' +
                            '<div class="people-input-inline" id="pplInline-' + fullName + '">' +
                            '<span class="text-muted mr-1" style="font-size:.9rem;">人數：</span>' +
                            '<input type="number" class="form-control form-control-sm"' +
                            ' id="ppl-' + fullName + '" min="1" max="99"' +
                            ' placeholder="人數" style="width:80px;">' +
                            '<span class="ml-1">人</span>' +
                            '</div>' +
                            '</div>';
                    });

                    html += '</div></div>';
                }
            });

            $("#areasContainer").html(html);

            // ── 單一區域 checkbox 事件 ────────────────────────────
            $(".area-checkbox:not(.zone-checkbox)").on("change", function () {
                var areaName = $(this).data("area");
                if ($(this).is(":checked")) {
                    $("#areaRow-" + areaName).addClass("selected");
                    $("#pplRow-" + areaName).slideDown(150, function () {
                        $("#ppl-" + areaName).focus();
                    });
                } else {
                    $("#areaRow-" + areaName).removeClass("selected");
                    $("#pplRow-" + areaName).slideUp(150);
                    $("#ppl-" + areaName).val("");
                }
                updateCarCount();
            });

            // ── 子區域 checkbox 事件 ──────────────────────────────
            $(".zone-checkbox").on("change", function () {
                var areaName = $(this).data("area");
                var $pplInline = $("#pplInline-" + areaName);
                if ($(this).is(":checked")) {
                    $pplInline.css("display", "flex");
                    $("#ppl-" + areaName).focus();
                } else {
                    $pplInline.hide();
                    $("#ppl-" + areaName).val("");
                }
                updateCarCount();
            });

            // ── 群組 checkbox 事件 ───────────────────────────────
            $(".area-group-checkbox").on("change", function () {
                var groupName = $(this).data("group");
                var $zonesRow = $("#zonesRow-" + groupName);
                if ($(this).is(":checked")) {
                    $("#areaGroupRow-" + groupName).addClass("selected");
                    $zonesRow.slideDown(150);
                } else {
                    // 取消全部子區域
                    $zonesRow.find(".zone-checkbox").each(function () {
                        if ($(this).is(":checked")) {
                            $(this).prop("checked", false).trigger("change");
                        }
                    });
                    $("#areaGroupRow-" + groupName).removeClass("selected");
                    $zonesRow.slideUp(150);
                }
            });

            // ── 點擊單一區域列切換 checkbox ───────────────────────
            $(".area-row:not(.area-group-row)").on("click", function (e) {
                if ($(e.target).is("input[type='number']")) return;
                if ($(e.target).is("input[type='checkbox']")) return;
                if ($(e.target).is("label")) return;
                var $chk = $(this).find(".area-checkbox");
                $chk.prop("checked", !$chk.prop("checked")).trigger("change");
            });

            // ── 點擊群組列標題切換群組 checkbox ──────────────────
            $(".area-group-row").on("click", function (e) {
                if ($(e.target).closest(".zone-item").length) return;
                if ($(e.target).is("input[type='number']")) return;
                if ($(e.target).is("input[type='checkbox']")) return;
                if ($(e.target).is("label")) return;
                var groupName = $(this).data("group");
                var $chk = $("#chkGroup-" + groupName);
                $chk.prop("checked", !$chk.prop("checked")).trigger("change");
            });

            // ── 點擊子區域列切換子 checkbox ──────────────────────
            $(".zone-item").on("click", function (e) {
                if ($(e.target).is("input[type='number']")) return;
                if ($(e.target).is("input[type='checkbox']")) return;
                if ($(e.target).is("label")) return;
                e.stopPropagation();
                var $chk = $(this).find(".zone-checkbox");
                $chk.prop("checked", !$chk.prop("checked")).trigger("change");
            });
        }

        // ── 自動更新車數顯示 ───────────────────────────────────────
        function updateCarCount() {
            var count = $(".area-checkbox:checked").length;
            $("#carCountDisplay").text(count + " 車");
        }

        // ── 送出訂位 ───────────────────────────────────────────────
        $("#submitBtn").on("click", function () {
            var name = $("#inputName").val().trim();
            var phone = $("#inputPhone").val().trim();
            var carPlate = $("#inputCarPlate").val().trim();
            var notes = $("#inputNotes").val().trim();

            // 收集已勾選區域
            var areas = [];
            $(".area-checkbox:checked").each(function () {
                var areaName = $(this).data("area");
                var people = parseInt($("#ppl-" + areaName).val(), 10);
                areas.push({ name: areaName, people: people });
            });

            // ── 前端驗證 ──
            if (selectedDates.length === 0) {
                showError("請選擇訂位日期"); return;
            }

            // 驗證日期連續性
            if (selectedDates.length > 1) {
                var isConsecutive = true;
                for (var i = 1; i < selectedDates.length; i++) {
                    var prev = new Date(selectedDates[i - 1]);
                    var curr = new Date(selectedDates[i]);
                    var diffDays = (curr - prev) / (1000 * 60 * 60 * 24);
                    if (diffDays !== 1) {
                        isConsecutive = false;
                        break;
                    }
                }
                if (!isConsecutive) {
                    showError("預約日期必須為連續的日期"); return;
                }
            }

            if (!name) {
                showError("請填寫姓名"); return;
            }
            if (!/^09\d{8}$/.test(phone)) {
                showError("電話格式錯誤，請填寫台灣手機號碼（09 開頭共 10 碼）"); return;
            }
            if (areas.length === 0) {
                showError("請至少選擇一個區域"); return;
            }
            for (var i = 0; i < areas.length; i++) {
                if (!areas[i].people || isNaN(areas[i].people) || areas[i].people <= 0) {
                    showError(areas[i].name + " 的人數必須大於 0"); return;
                }
            }

            // 檢查 LIFF Token
            if (!LINE_ID_TOKEN) {
                showError("請在 LINE App 中開啟此頁面進行預約"); return;
            }

            hideError();
            $("#submitBtn").prop("disabled", true).text("送出中…");

            // ── 呼叫後端 API ──
            var requestData = {
                idToken: LINE_ID_TOKEN,
                bookingDates: selectedDates,
                name: name,
                phone: phone,
                carPlate: carPlate,
                areasJson: JSON.stringify(areas),
                lineUserId: LINE_USER_ID,
                notes: notes
            };

            fetch(API_BASE_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=UTF-8'
                },
                body: JSON.stringify(requestData)
            })
                .then(function (response) { return response.json(); })
                .then(function (result) {
                    if (result.success) {
                        // 成功：隱藏表單，顯示完成訊息
                        $(".card-section").hide();
                        $("#submitBtn").hide();
                        $("#output").html(
                            '<div class="alert alert-success text-center mt-3" style="border-radius:10px; font-size:1.1rem;">' +
                            '<strong>✅ ' + result.message + '</strong>' +
                            '</div>' +
                            '<button type="button" class="btn btn-primary btn-submit mt-3" onclick="closeWindow()">' +
                            '關閉' +
                            '</button>'
                        );
                    } else {
                        showError(result.message);
                        $("#submitBtn").prop("disabled", false).text("確認送出訂位");
                    }
                })
                .catch(function (error) {
                    console.error('Submission error:', error);
                    showError("系統錯誤，請稍後再試。");
                    $("#submitBtn").prop("disabled", false).text("確認送出訂位");
                });
        });

        // ── 關閉視窗 ───────────────────────────────────────────────
        function closeWindow() {
            if (typeof liff !== 'undefined' && liff.isInClient()) {
                liff.closeWindow();
            } else {
                window.close();
            }
        }

        // ── 工具函式 ───────────────────────────────────────────────
        function showError(msg) {
            $("#errorMsg").text(msg).show();
            $("html, body").animate({ scrollTop: $("#errorMsg").offset().top - 20 }, 250);
        }

        function hideError() {
            $("#errorMsg").hide();
        }

        // ── Hover 輔助：從 TD 元素取得日期字串 ───────────────────
        function getDateFromTd(td) {
            var $link = $(td).find("a");
            if ($link.length === 0) return null;
            // 只讀直接文字節點，避免把徽章數字混入
            var dayText = '';
            $link.contents().each(function () {
                if (this.nodeType === 3) dayText += this.nodeValue;
            });
            var day = parseInt(dayText.trim(), 10);
            if (isNaN(day)) return null;

            var yearText = $("#datepicker .ui-datepicker-year").text().trim();
            var monthText = $("#datepicker .ui-datepicker-month").text().trim();
            var year = parseInt(yearText, 10);
            var monthNames = ["1月", "2月", "3月", "4月", "5月", "6月",
                "7月", "8月", "9月", "10月", "11月", "12月"];
            var month = monthNames.indexOf(monthText);
            if (isNaN(year) || month === -1) return null;

            return formatDate(new Date(year, month, day));
        }

        function highlightHoverRange(hoverDateStr) {
            clearHoverHighlight();
            if (!rangeStart) return;
            var start = new Date(rangeStart.replace(/\//g, '-'));
            var end = new Date(hoverDateStr.replace(/\//g, '-'));
            if (end < start) { var tmp = start; start = end; end = tmp; }

            $("#datepicker .ui-datepicker-calendar td").each(function () {
                var dateStr = getDateFromTd(this);
                if (!dateStr) return;
                var d = new Date(dateStr.replace(/\//g, '-'));
                if (d >= start && d <= end) {
                    $(this).addClass("hover-range-preview");
                }
            });
        }

        function clearHoverHighlight() {
            $("#datepicker .ui-datepicker-calendar td").removeClass("hover-range-preview");
        }

        function formatDate(date) {
            var year = date.getFullYear();
            var month = (date.getMonth() + 1);
            var day = date.getDate();
            return year + '/' + (month < 10 ? '0' + month : month) + '/' + (day < 10 ? '0' + day : day);
        }
    </script>
